<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Svazer Upload</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0b;
      --bg-card: rgba(18, 18, 22, 0.8);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.2);
      --text: #fff;
      --text-secondary: rgba(255,255,255,0.5);
      --text-tertiary: rgba(255,255,255,0.25);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --success: #22c55e;
      --success-glow: rgba(34, 197, 94, 0.3);
      --error: #ef4444;
      --gradient-1: #3b82f6;
      --gradient-2: #8b5cf6;
      --gradient-3: #06b6d4;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
      z-index: -2;
      animation: bgShift 20s ease-in-out infinite;
    }

    @keyframes bgShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 1%) rotate(1deg); }
      66% { transform: translate(-1%, -1%) rotate(-1deg); }
    }

    .grid {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: -1;
      mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 70%);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(10,10,11,0.6);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-brand .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 100px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-chip {
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-chip svg { width: 12px; height: 12px; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: box-shadow 0.3s ease;
    }

    .card-header {
      margin-bottom: 24px;
      text-align: center;
    }

    .card-header .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .card-header .icon-wrap svg {
      width: 22px;
      height: 22px;
      color: var(--accent);
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      background: rgba(255,255,255,0.02);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      background: conic-gradient(from 0deg, transparent, var(--accent-glow), transparent, var(--accent-glow), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: -1;
    }

    .drop-zone:hover::before,
    .drop-zone.drag-over::before {
      opacity: 1;
      animation: borderSpin 3s linear infinite;
    }

    @keyframes borderSpin {
      to { transform: rotate(360deg); }
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: transparent;
      background: rgba(59,130,246,0.04);
      transform: translateY(-1px);
    }

    .drop-zone-icon {
      margin-bottom: 16px;
      transition: transform 0.3s ease;
    }

    .drop-zone:hover .drop-zone-icon {
      transform: scale(1.1) translateY(-2px);
    }

    .drop-zone-icon svg {
      width: 36px;
      height: 36px;
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }

    .drop-zone:hover .drop-zone-icon svg,
    .drop-zone.drag-over .drop-zone-icon svg {
      color: var(--accent);
    }

    .drop-zone-text h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-zone-text p {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .file-input { display: none; }

    .file-info {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 16px;
      animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .file-info.show { display: flex; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(139,92,246,0.12));
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-icon svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    .file-details { flex: 1; min-width: 0; }

    .file-details .name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-details .meta {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .remove-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: all 0.2s ease;
      flex-shrink: 0;
      line-height: 0;
    }

    .remove-btn:hover {
      color: var(--error);
      border-color: rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.08);
    }

    .remove-btn svg { width: 16px; height: 16px; }

    .upload-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
    }

    .upload-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .upload-btn:hover:not(:disabled)::after { transform: translateX(100%); }
    .upload-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 24px var(--accent-glow); }
    .upload-btn:active:not(:disabled) { transform: translateY(0); }

    .upload-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .upload-btn .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .upload-btn svg { width: 16px; height: 16px; }

    .result {
      display: none;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      animation: resultIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .result.show { display: block; }

    @keyframes resultIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 10px;
    }

    .result-header svg {
      width: 20px;
      height: 20px;
      color: var(--success);
      filter: drop-shadow(0 0 8px var(--success-glow));
      animation: checkPop 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    @keyframes checkPop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .result-header span {
      font-size: 14px;
      font-weight: 600;
      color: var(--success);
    }

    .url-section {
      margin-bottom: 6px;
    }

    .url-section:last-of-type { margin-bottom: 0; }

    .url-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .url-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .url-row:last-child { margin-bottom: 0; }

    .url-input {
      flex: 1;
      padding: 9px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12.5px;
      font-family: 'Inter', monospace;
      outline: none;
      transition: all 0.2s ease;
      min-width: 0;
    }

    .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .url-input::selection { background: var(--accent-glow); }

    .copy-btn {
      padding: 9px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(255,255,255,0.07);
    }

    .copy-btn.copied {
      border-color: var(--success);
      color: var(--success);
      background: rgba(34,197,94,0.08);
    }

    .copy-btn svg { width: 14px; height: 14px; }

    .preview-img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 10px;
      margin-top: 16px;
      display: none;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .preview-img.show { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(18,18,22,0.95);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .footer {
      text-align: center;
      padding: 20px 24px;
      font-size: 12px;
      color: var(--text-tertiary);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 540px) {
      .card { padding: 24px 20px; border-radius: 12px; }
      .drop-zone { padding: 36px 20px; }
      .nav { padding: 14px 16px; }
      .url-row { flex-direction: column; }
      .copy-btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="grid"></div>

  <nav class="nav">
    <a href="/" class="nav-brand">
      <img src="/favicon.png" alt="" style="width:20px;height:20px;border-radius:6px;object-fit:cover">
      Svazer
      <span class="badge">Upload</span>
    </a>
    <div class="nav-right">
      <span class="nav-chip">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0l-3-3m3 3l3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
        max 25 MB
      </span>
    </div>
  </nav>

  <div class="main">
    <div class="card">
      <div class="card-header">
        <div class="icon-wrap">
          <img src="/favicon.png" alt="" style="width:24px;height:24px;border-radius:8px;object-fit:cover">
        </div>
        <h1>Upload your file</h1>
        <p>Select a file and get a shareable link instantly</p>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
          </svg>
        </div>
        <div class="drop-zone-text">
          <h3>Choose a file</h3>
          <p>or drag and drop here</p>
        </div>
        <input type="file" id="fileInput" class="file-input">
      </div>

      <div class="file-info" id="fileInfo">
        <div class="file-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
          </svg>
        </div>
        <div class="file-details">
          <div class="name" id="fileName">-</div>
          <div class="meta" id="fileSize">-</div>
        </div>
        <button class="remove-btn" onclick="removeFile()" title="Remove">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <button class="upload-btn" id="uploadBtn" onclick="uploadFile()" disabled>
        <span class="btn-content">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          Upload
        </span>
      </button>

      <div class="result" id="result">
        <div class="result-header">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>Uploaded successfully</span>
        </div>

        <div class="url-section">
          <div class="url-label">File URL</div>
          <div class="url-row">
            <input type="text" id="fileUrl" class="url-input" readonly>
            <button class="copy-btn" onclick="copy(this, 'fileUrl')">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184z" />
              </svg>
              Copy
            </button>
          </div>
        </div>

        <img class="preview-img" id="previewImg" alt="Preview">
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="footer">Svazer Upload</div>

  <script>
    let selectedFile = null;
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      dropZone.style.display = 'none';
      document.getElementById('fileInfo').classList.add('show');
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileSize').textContent = formatSize(file.size);
    }

    function removeFile() {
      selectedFile = null;
      fileInput.value = '';
      dropZone.style.display = 'block';
      document.getElementById('fileInfo').classList.remove('show');
      document.getElementById('uploadBtn').disabled = true;
      document.getElementById('result').classList.remove('show');
      document.getElementById('previewImg').classList.remove('show');
    }

    async function uploadFile() {
      if (!selectedFile) return;

      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-content"><span class="spinner"></span> Uploading...</span>';

      try {
        const reqRes = await fetch('/api/request-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileName: selectedFile.name, fileType: selectedFile.type })
        });
        const reqData = await reqRes.json();
        if (!reqRes.ok) throw new Error(reqData.error);

        const upRes = await fetch(reqData.uploadUrl, {
          method: 'PUT',
          headers: { 'Content-Type': selectedFile.type },
          body: selectedFile
        });
        if (!upRes.ok) throw new Error('Upload to storage failed');

        const upData = await upRes.json();

        const finRes = await fetch('/api/finalize-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: reqData.filename, blobUrl: upData.url, fileType: selectedFile.type })
        });
        const finData = await finRes.json();
        if (!finRes.ok) throw new Error(finData.error);

        document.getElementById('fileUrl').value = finData.url;
        document.getElementById('result').classList.add('show');

        if (selectedFile.type.startsWith('image/')) {
          const img = document.getElementById('previewImg');
          img.src = finData.url;
          img.classList.add('show');
        }
      } catch (err) {
        showToast('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-content"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg> Upload</span>';
      }
    }

    function copy(btn, inputId) {
      const input = document.getElementById(inputId);
      navigator.clipboard.writeText(input.value).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg> Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = original;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
  </script>
</body>
</html>
